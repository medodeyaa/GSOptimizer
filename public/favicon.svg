<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Rounded dark tile to match the app surface -->
  <rect width="48" height="48" rx="11" fill="#101412"/>

  <!-- Performance gauge: 220° arc, mint accent -->
  <g fill="none" stroke-linecap="round">
    <!-- Track -->
    <path d="M11.8 33.3 A 15 15 0 1 1 36.2 33.3" stroke="#24302b" stroke-width="5"/>
    <!-- Filled portion (≈75% — high performance) -->
    <path d="M11.8 33.3 A 15 15 0 0 1 36 8.9" stroke="#6ee7b7" stroke-width="5"/>
  </g>

  <!-- Tick marks -->
  <g stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
    <line x1="10.0" y1="27.4" x2="12.7" y2="26.6"/>
    <line x1="11.7" y1="18.6" x2="14.0" y2="20.2"/>
    <line x1="18.6" y1="11.7" x2="20.2" y2="14.0"/>
    <line x1="27.4" y1="10.0" x2="26.6" y2="12.7"/>
  </g>

  <!-- Needle pointing to upper-right (high) -->
  <g stroke-linecap="round">
    <line x1="24" y1="30" x2="31.5" y2="16.5" stroke="#6ee7b7" stroke-width="2.4"/>
    <circle cx="24" cy="30" r="3.3" fill="#101412" stroke="#6ee7b7" stroke-width="2.2"/>
  </g>
</svg>
